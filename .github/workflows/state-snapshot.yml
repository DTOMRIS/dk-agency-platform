name: State Snapshot

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate STATE.md
        run: BUILD_STATUS=PASS npm run snapshot:state

      - name: Commit state snapshot
        run: |
          if git diff --quiet docs/STATE.md; then
            echo "No state change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/STATE.md
          git commit -m "TASK-0001 chore: auto-update STATE snapshot"
          git push
