name: Daily News Fetch

permissions:
  contents: write

on:
  schedule:
    - cron: '0 8 * * *'  # Hər gün 08:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and translate news
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run fetch:news -- --limit=12

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet lib/data/pendingNews.json; then
            echo "No changes to commit"
          else
            git add lib/data/pendingNews.json
            git commit -m "chore: fetch RSS → pending news (admin təsdiqi gözləyir) [skip ci]"
            git push
          fi
